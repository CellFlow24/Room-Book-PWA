<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Room Book PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <div class="login-box">
            <img src="icon-192.png" alt="Room Book Logo" class="app-logo">
            <h1 class="app-title">Room Book</h1>
            <input type="text" id="userId" placeholder="User ID">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">LOGIN</button>
            <p id="login-message" class="error-text"></p>
        </div>
    </div>

    <!-- PASSWORD RESET SCREEN -->
    <div id="reset-screen" class="screen" style="display: none;">
        <div class="login-box">
            <h2 class="app-title">Update Password</h2>
            <p style="color: #2c3e50; margin-bottom: 15px;">Since this is your first time, please create a new password.</p>
            <input type="password" id="newPassword" placeholder="New Password">
            <button onclick="changePassword()">SAVE PASSWORD</button>
            <p id="reset-message" class="error-text"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="screen" style="display: none;">
        <div class="login-box">
            <h2 id="welcome-text" class="app-title"></h2>
            
            <div class="button-grid">
                <button class="nav-btn">💸 EXPENCE</button>
                <button class="nav-btn">🧹 COOKING & CLEANING</button>
                <button class="nav-btn">💳 Pay Detels</button>
                <button class="nav-btn">📊 EXPENCE REVIEW</button>
                <button class="nav-btn">💬 Chat</button>
            </div>
            
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <!-- EXPENSE ENTRY SCREEN -->
    <div id="expense-screen" class="screen" style="display: none;">
        <div class="login-box">
            <h2 class="app-title">Add Expense</h2>
            
            <input type="text" id="expenseFor" placeholder="What is it for? (e.g. Dinner)">
            <input type="number" id="expenseAmount" placeholder="Amount (₹)">
            
            <div class="split-section">
                <p class="split-title">Split With:</p>
                <label class="split-label"><input type="checkbox" class="split-check" value="Dipun" checked> Dipun</label>
                <label class="split-label"><input type="checkbox" class="split-check" value="Partha" checked> Partha</label>
                <label class="split-label"><input type="checkbox" class="split-check" value="Asib" checked> Asib</label>
            </div>

            <button onclick="saveExpense()">SAVE EXPENSE</button>
            <button onclick="goBackToDashboard()" class="back-btn">BACK</button>
            <p id="expense-message" class="error-text"></p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
